<style>
  :root{
    --crimson:#AE1C2B;
    --crimson-dark:#7C1420;
    --crimson-tint:#FBEBEC;
    --navy:#0E2A4A;
    --navy-2:#173C64;
    --gold:#B8922F;
    --gold-light:#E4C876;
    --paper:#FBFAF7;
    --paper-2:#F2EFE7;
    --white:#FFFFFF;
    --text:#181B20;
    --text-soft:#666B76;
    --line:#E4E0D6;
    --shadow: 0 20px 50px -20px rgba(14,42,74,0.25);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--paper);color:var(--text);
    font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Libre Caslon Display',serif;letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--gold-light);}
  img{display:block;max-width:100%;}

  /* ---------- RIBBON ---------- */
  .tri-ribbon{height:4px;display:flex;}
  .tri-ribbon span{flex:1;}
  .tri-ribbon .c{background:var(--crimson);}
  .tri-ribbon .n{background:var(--navy);}
  .tri-ribbon .g{background:var(--gold);}

  /* ---------- TOP BAR ---------- */
  .topbar{
    background:var(--white);
    padding:14px 40px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--line);
    box-shadow:0 1px 0 rgba(14,42,74,0.03);
  }
  .brand{display:flex;align-items:center;gap:14px;cursor:pointer;}
  .brand img{width:42px;height:42px;object-fit:cover;border-radius:50%;border:1.5px solid var(--gold);}
  .brand-text .name{font-family:'Libre Caslon Display',serif;font-size:17px;color:var(--navy);letter-spacing:0.01em;}
  .brand-text .tag{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--crimson);font-weight:600;margin-top:2px;}
  .crumbs{font-size:12.5px;color:var(--text-soft);letter-spacing:0.01em;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .crumbs span.sep{opacity:0.5;}
  .crumbs a:hover{color:var(--crimson);}
  .nav-links{display:flex;gap:30px;align-items:center;}
  .nav-links a{font-size:12.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--navy);}
  .nav-links a:hover{color:var(--crimson);}

  #app{min-height:calc(100vh - 90px);}
  .wrap{max-width:1180px;margin:0 auto;padding:0 40px;}

  /* ---------- HERO ---------- */
  .hero{
    background:
      radial-gradient(ellipse 900px 500px at 85% -10%, rgba(184,146,47,0.14), transparent 60%),
      linear-gradient(150deg, var(--navy) 0%, #0A1D33 100%);
    color:var(--white);
    padding:100px 40px 0;
    position:relative;overflow:hidden;
  }
  .hero-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1.15fr 0.85fr;gap:60px;align-items:center;position:relative;padding-bottom:110px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.24em;text-transform:uppercase;
    color:var(--gold-light);margin-bottom:24px;display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:"";width:30px;height:1px;background:var(--gold-light);}
  .hero h1{font-size:clamp(36px,4.6vw,56px);line-height:1.08;font-weight:400;margin:0 0 22px;}
  .hero h1 em{font-style:italic;color:var(--gold-light);}
  .hero p{font-size:16.5px;line-height:1.7;color:#C7D0DD;max-width:480px;margin:0 0 38px;}
  .cta-row{display:flex;gap:16px;flex-wrap:wrap;}
  .btn-primary{
    background:var(--crimson);color:var(--white);font-weight:600;font-size:14px;
    padding:16px 30px;border-radius:2px;display:inline-flex;align-items:center;gap:10px;
    border:1px solid var(--crimson);transition:all .18s ease;letter-spacing:0.01em;
  }
  .btn-primary:hover{background:var(--crimson-dark);border-color:var(--crimson-dark);transform:translateY(-1px);}
  .btn-ghost{
    border:1px solid rgba(255,255,255,0.28);color:var(--white);font-size:13.5px;font-weight:500;
    padding:15px 24px;border-radius:2px;transition:all .18s ease;
  }
  .btn-ghost:hover{border-color:var(--gold-light);background:rgba(228,200,118,0.08);}
  .hero-crest{
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .hero-crest .ring{
    width:340px;height:340px;border-radius:50%;
    border:1px solid rgba(228,200,118,0.35);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .hero-crest .ring::before{
    content:"";position:absolute;inset:22px;border-radius:50%;border:1px solid rgba(228,200,118,0.18);
  }
  .hero-crest img{
    width:270px;height:270px;object-fit:cover;border-radius:50%;
    border:3px solid var(--gold-light);
    box-shadow:0 20px 45px rgba(0,0,0,0.45), 0 0 0 8px rgba(228,200,118,0.08);
  }
  .hero-stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid rgba(228,200,118,0.22);padding:30px 0;
  }
  .stat .num{font-family:'Libre Caslon Display',serif;font-size:32px;color:var(--gold-light);}
  .stat .lbl{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#93A0B4;margin-top:5px;}

  /* ---------- SECTIONS ---------- */
  .section{padding:80px 0;}
  .section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:44px;flex-wrap:wrap;gap:14px;}
  .section-head h2{font-size:30px;font-weight:400;margin:0;color:var(--navy);}
  .section-head .sub{color:var(--text-soft);font-size:14px;margin-top:8px;max-width:480px;}
  .index-no{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--crimson);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:8px;display:block;font-weight:600;}

  /* ---------- YEAR CARDS ---------- */
  .year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .year-card{
    background:var(--white);border:1px solid var(--line);padding:34px 30px;cursor:pointer;
    transition:all .2s ease;position:relative;overflow:hidden;
  }
  .year-card::before{
    content:"";position:absolute;top:0;left:0;width:100%;height:3px;
    background:linear-gradient(90deg,var(--crimson),var(--gold));
    transform:scaleX(0);transform-origin:left;transition:transform .25s ease;
  }
  .year-card:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:transparent;}
  .year-card:hover::before{transform:scaleX(1);}
  .year-card:hover .arrow{transform:translateX(4px);color:var(--crimson);}
  .year-card .yr{font-family:'Libre Caslon Display',serif;font-size:42px;color:var(--navy);}
  .year-card .meta{margin-top:10px;font-size:13px;color:var(--text-soft);}
  .year-card .meta b{color:var(--crimson);font-weight:600;}
  .year-card .arrow{margin-top:24px;font-size:12.5px;font-weight:600;letter-spacing:0.03em;color:var(--navy-2);display:inline-flex;align-items:center;gap:6px;transition:all .2s ease;}

  /* ---------- ROSTER ---------- */
  .roster-toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:26px;flex-wrap:wrap;}
  .search-box{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--white);padding:11px 16px;min-width:280px;}
  .search-box input{border:none;outline:none;background:transparent;font-family:'Inter';font-size:13.5px;width:100%;color:var(--text);}
  .roster-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line);}
  .roster-table thead th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--text-soft);padding:15px 18px;border-bottom:1px solid var(--line);background:var(--paper-2);
  }
  .roster-table tbody tr{cursor:pointer;border-bottom:1px solid var(--line);transition:background .14s ease;}
  .roster-table tbody tr:last-child{border-bottom:none;}
  .roster-table tbody tr:hover{background:var(--crimson-tint);}
  .roster-table td{padding:17px 18px;font-size:14px;vertical-align:top;}
  .rt-sno{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-size:12.5px;width:44px;font-weight:600;}
  .rt-name{font-weight:700;color:var(--navy);}
  .rt-topic{color:var(--text-soft);font-size:12.5px;max-width:340px;}
  .rt-guide{font-size:12.5px;color:var(--text-soft);}
  .status-pill{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:600;}
  .status-pass{background:rgba(14,42,74,0.08);color:var(--navy);}
  .status-ongoing{background:rgba(184,146,47,0.14);color:#8A6A1E;}
  .status-flag{background:rgba(174,28,43,0.09);color:var(--crimson);}

  /* ---------- DETAIL VIEW ---------- */
  .detail-shell{display:grid;grid-template-columns:310px 1fr;border:1px solid var(--line);background:var(--white);min-height:70vh;box-shadow:var(--shadow);}
  .side-panel{background:var(--navy);color:var(--white);padding:28px 0;max-height:calc(100vh - 90px);overflow-y:auto;position:sticky;top:90px;}
  .side-panel::-webkit-scrollbar{width:6px;}
  .side-panel::-webkit-scrollbar-thumb{background:var(--navy-2);}
  .side-title{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold-light);padding:0 26px 16px;}
  .side-search{padding:0 26px 18px;}
  .side-search input{width:100%;background:var(--navy-2);border:1px solid rgba(228,200,118,0.22);color:var(--white);font-size:12.5px;padding:10px 12px;font-family:'Inter';outline:none;}
  .side-search input::placeholder{color:#7C8CA3;}
  .side-year-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7C8CA3;letter-spacing:0.1em;padding:12px 26px 6px;position:sticky;top:0;background:var(--navy);}
  .side-item{display:flex;justify-content:space-between;gap:10px;padding:10px 26px;font-size:12.8px;cursor:pointer;border-left:2px solid transparent;color:#D4DAE6;}
  .side-item:hover{background:rgba(228,200,118,0.08);}
  .side-item.active{background:rgba(228,200,118,0.14);border-left:2px solid var(--gold-light);color:var(--white);font-weight:600;}
  .side-item .sid{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold-light);opacity:0.85;flex-shrink:0;}

  .main-panel{padding:48px 52px;}
  .dp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:30px;margin-bottom:30px;}
  .dp-id{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--crimson);letter-spacing:0.08em;margin-bottom:10px;font-weight:600;}
  .dp-name{font-size:34px;font-weight:400;margin:0 0 8px;color:var(--navy);}
  .dp-batch{font-size:13.5px;color:var(--text-soft);}
  .seal-badge{
    width:82px;height:82px;border-radius:50%;border:2px solid var(--gold);
    display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, rgba(184,146,47,0.10), transparent 70%);position:relative;
  }
  .seal-badge::before{content:"";position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(184,146,47,0.35);}
  .seal-badge .yr{font-family:'Libre Caslon Display',serif;font-size:20px;color:var(--navy);}
  .seal-badge .lbl{font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:0.1em;color:var(--crimson);text-transform:uppercase;font-weight:600;}

  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:30px;}
  .field{background:var(--white);padding:22px 26px;}
  .field .k{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-soft);margin-bottom:9px;}
  .field .v{font-size:15px;color:var(--text);word-break:break-word;}
  .field .v.empty{color:#B7BAC2;font-style:italic;}
  .field .v a{color:var(--crimson);border-bottom:1px solid rgba(174,28,43,0.3);}

  .topic-block{background:var(--paper-2);border-left:3px solid var(--crimson);padding:28px 30px;margin-bottom:30px;}
  .topic-block .k{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--crimson);margin-bottom:11px;font-weight:600;}
  .topic-block .v{font-family:'Libre Caslon Display',serif;font-size:19px;line-height:1.55;color:var(--navy);}

  .nav-buttons{display:flex;gap:12px;margin-top:38px;flex-wrap:wrap;}
  .nav-btn{border:1px solid var(--line);padding:12px 20px;font-size:13px;font-weight:500;color:var(--text-soft);transition:all .16s ease;}
  .nav-btn:hover{border-color:var(--crimson);color:var(--navy);}

  /* ---------- TESTIMONIAL / TRUST STRIP (home) ---------- */
  .trust-strip{background:var(--navy);color:var(--white);padding:70px 40px;}
  .trust-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
  .trust-inner blockquote{font-family:'Libre Caslon Display',serif;font-size:24px;line-height:1.5;font-style:italic;color:var(--white);margin:0 0 20px;}
  .trust-attr{font-size:13px;color:var(--gold-light);font-weight:600;}
  .trust-attr span{display:block;color:#93A0B4;font-weight:400;font-size:12px;margin-top:3px;}
  .trust-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(228,200,118,0.18);}
  .trust-stat{padding:22px 10px;text-align:center;}
  .trust-stat .num{font-family:'Libre Caslon Display',serif;font-size:30px;color:var(--gold-light);}
  .trust-stat .lbl{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:#93A0B4;margin-top:6px;}

  .empty-state{padding:90px 20px;text-align:center;color:var(--text-soft);}
  .empty-state h3{font-size:22px;margin-bottom:10px;color:var(--navy);font-weight:400;}
  footer{background:var(--white);border-top:1px solid var(--line);padding:0;}
  .foot-inner{max-width:1180px;margin:0 auto;padding:50px 40px 34px;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;}
  .foot-brand{display:flex;gap:14px;align-items:center;}
  .foot-brand img{width:38px;height:38px;object-fit:cover;border-radius:50%;border:1.5px solid var(--gold);}
  .foot-brand .name{font-family:'Libre Caslon Display',serif;font-size:15px;color:var(--navy);}
  .foot-brand .tag{font-size:10px;color:var(--text-soft);margin-top:2px;}
  .foot-meta{font-size:12px;color:var(--text-soft);text-align:right;line-height:1.8;}

  @media (max-width:900px){
    .hero-inner{grid-template-columns:1fr;padding-bottom:50px;}
    .hero-crest{display:none;}
    .hero-stats{grid-template-columns:repeat(2,1fr);row-gap:22px;}
    .detail-shell{grid-template-columns:1fr;}
    .side-panel{position:relative;top:0;max-height:280px;}
    .field-grid{grid-template-columns:1fr;}
    .main-panel{padding:34px 22px;}
    .wrap{padding:0 20px;}
    .trust-inner{grid-template-columns:1fr;}
    .nav-links{display:none;}
    .topbar{padding:14px 20px;}
    .hero{padding:70px 20px 0;}
  }

  /* ---------------- MODAL (Add / Edit Scholar) ---------------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(14,42,74,0.55);display:flex;align-items:flex-start;justify-content:center;padding:60px 20px;z-index:200;overflow-y:auto;}
  .modal-box{background:var(--white);max-width:640px;width:100%;box-shadow:var(--shadow);border:1px solid var(--line);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:22px 30px;border-bottom:1px solid var(--line);}
  .modal-head h3{margin:0;font-size:21px;font-weight:400;color:var(--navy);font-family:'Libre Caslon Display',serif;}
  .modal-close{background:none;border:none;font-size:22px;color:var(--text-soft);cursor:pointer;line-height:1;}
  .modal-body{padding:26px 30px;display:grid;grid-template-columns:1fr 1fr;gap:18px;max-height:60vh;overflow-y:auto;}
  .modal-body .full{grid-column:1/-1;}
  .form-field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-soft);margin-bottom:7px;}
  .form-field input, .form-field textarea{
    width:100%;border:1px solid var(--line);padding:10px 12px;font-family:'Inter';font-size:13.5px;color:var(--text);background:var(--paper);outline:none;
  }
  .form-field input:focus, .form-field textarea:focus{border-color:var(--crimson);}
  .form-field textarea{resize:vertical;min-height:70px;font-family:'Inter';}
  .modal-actions{padding:18px 30px 26px;display:flex;justify-content:flex-end;gap:12px;border-top:1px solid var(--line);}
  .btn-secondary{border:1px solid var(--line);background:var(--white);padding:12px 22px;font-size:13px;font-weight:500;color:var(--text-soft);cursor:pointer;}
  .btn-secondary:hover{border-color:var(--navy);color:var(--navy);}
  .btn-add{background:var(--crimson);color:var(--white);font-weight:600;font-size:13px;padding:12px 20px;border:none;cursor:pointer;letter-spacing:0.01em;transition:all .18s ease;}
  .btn-add:hover{background:var(--crimson-dark);transform:translateY(-1px);}
  @media (max-width:600px){ .modal-body{grid-template-columns:1fr;} }
</style>
</head>

<script>
// ---------------- GOOGLE SHEET BACKEND ----------------
// Paste the Apps Script Web App URL here after you deploy Code.gs (see setup notes).
const API_URL = 'https://script.google.com/macros/s/AKfycbzmnGPqAvBANFIo5WQKY6mchXJJLgV7Dc44IQ-wXvj9iS-USjbf3eel44jCja29Bxsckg/exec';

let STUDENTS = [];
let YEARS = [];
let LOADING = true;
let LOAD_ERROR = null;

async function loadStudents(){
  LOADING = true;
  LOAD_ERROR = null;
  render();
  try {
    const res = await fetch(API_URL + '?action=list');
    const data = await res.json();
    if(data && data.error) throw new Error(data.error);
    STUDENTS = data;
    YEARS = computeYears();
  } catch(err){
    LOAD_ERROR = err.message || String(err);
  } finally {
    LOADING = false;
    render();
  }
}
function computeYears(){ return [...new Set(STUDENTS.map(s=>s.year))].sort(); }

function byYear(y){ return STUDENTS.filter(s=>s.year===y).sort((a,b)=>a.sno-b.sno); }
function findStudent(id){ return STUDENTS.find(s=>s.id===id); }

function statusClass(status){
  const s = (status||'').toLowerCase();
  if(s.includes('pass') || s.includes('completed')) return 'status-pass';
  if(s === '' || s.includes('microbiology')) return 'status-flag';
  return 'status-ongoing';
}
function esc(str){
  return (str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function navigate(hash){ location.hash = hash; }
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', loadStudents);

function parseHash(){
  const h = location.hash.replace(/^#\/?/, '');
  return h.split('/').filter(Boolean);
}

function render(){
  YEARS = computeYears();
  const parts = parseHash();
  const app = document.getElementById('app');

  if(LOADING){
    app.innerHTML = `<div class="wrap section"><div class="empty-state"><h3>Loading scholar records…</h3><p>Pulling the latest data from the Google Sheet.</p></div></div>`;
    return;
  }
  if(LOAD_ERROR){
    app.innerHTML = `<div class="wrap section"><div class="empty-state"><h3>Could not load records</h3><p>${esc(LOAD_ERROR)}</p><button class="btn-primary" style="margin-top:18px;border:none;cursor:pointer;" onclick="loadStudents()">Retry</button></div></div>`;
    return;
  }

  if(parts.length === 0){
    app.innerHTML = renderHome();
    setCrumbs([]);
  } else if(parts[0] === 'directory' && parts.length === 1){
    app.innerHTML = renderDirectory();
    setCrumbs([{label:'PhD Student Directory'}]);
  } else if(parts[0] === 'year' && parts[1]){
    app.innerHTML = renderRoster(parts[1]);
    setCrumbs([{label:'Directory', href:'#/directory'},{label:'Batch '+parts[1]}]);
    attachRosterSearch();
  } else if(parts[0] === 'student' && parts[1]){
    const st = findStudent(parts[1]);
    if(st){
      app.innerHTML = renderDetail(st);
      setCrumbs([{label:'Directory', href:'#/directory'},{label:'Batch '+st.year, href:'#/year/'+st.year},{label:st.name}]);
      attachSideSearch(st.id);
    } else { app.innerHTML = renderNotFound(); }
  } else {
    app.innerHTML = renderHome();
    setCrumbs([]);
  }
  window.scrollTo({top:0,behavior:'instant'});
}

function setCrumbs(trail){
  const el = document.getElementById('crumbs');
  if(trail.length===0){ el.innerHTML=''; return; }
  el.innerHTML = trail.map((t,i)=>{
    const link = t.href ? `<a href="${t.href}">${esc(t.label)}</a>` : `<span>${esc(t.label)}</span>`;
    return (i>0?'<span class="sep">/</span>':'') + link;
  }).join('');
}

function yearGridHTML(){
  return `<div class="year-grid">
    ${YEARS.map(y=>{
      const list = byYear(y);
      const pass = list.filter(s=>statusClass(s.status)==='status-pass').length;
      return `
      <div class="year-card" onclick="navigate('year/${y}')">
        <div class="yr">${y}</div>
        <div class="meta">${list.length} scholar${list.length!==1?'s':''} registered${pass?` · <b>${pass} awarded</b>`:''}</div>
        <div class="arrow">View roster →</div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ---------------- DIRECTORY ---------------- */
function renderDirectory(){
  return `
  <div class="wrap section" style="padding-top:60px;">
    <div class="section-head">
      <div>
        <span class="index-no">PhD Student Flow</span>
        <h2>PhD Student Directory</h2>
        <div class="sub">${STUDENTS.length} scholars across ${YEARS.length} admission batches. Choose a batch to continue.</div>
      </div>
      <button class="btn-add" onclick="openStudentForm('add')">+ Add New Scholar</button>
    </div>
    ${yearGridHTML()}
  </div>`;
}

/* ---------------- ROSTER ---------------- */
function renderRoster(year){
  const list = byYear(year);
  if(list.length===0) return renderNotFound();
  return `
  <div class="wrap section" style="padding-top:60px;">
    <div class="section-head">
      <div>
        <span class="index-no">Batch ${year}</span>
        <h2>Scholar roster — ${year}</h2>
        <div class="sub">${list.length} candidate${list.length!==1?'s':''} admitted this batch. Click a name to open the full record.</div>
      </div>
    </div>
    <div class="roster-toolbar">
      <div class="search-box">
        <span class="mono" style="font-size:13px;color:var(--text-soft);">⌕</span>
        <input id="rosterSearch" placeholder="Filter by name, guide, or topic…">
      </div>
      <button class="btn-add" onclick="openStudentForm('add','${year}')">+ Add New Scholar</button>
    </div>
    <table class="roster-table">
      <thead><tr><th>No.</th><th>Scholar</th><th>Guide</th><th>Research Topic</th><th>Status</th></tr></thead>
      <tbody id="rosterBody">${list.map(rosterRow).join('')}</tbody>
    </table>
  </div>`;
}

function rosterRow(s){
  const topic = s.topic ? esc(s.topic) : '<span style="color:#B7BAC2;font-style:italic;">Not yet decided</span>';
  const guide = s.guide ? esc(s.guide) : '<span style="color:#B7BAC2;font-style:italic;">Unassigned</span>';
  return `
  <tr onclick="navigate('student/${s.id}')" data-search="${esc((s.name+' '+s.guide+' '+s.topic).toLowerCase())}">
    <td class="rt-sno">${String(s.sno).padStart(2,'0')}</td>
    <td class="rt-name">${esc(s.name)}</td>
    <td class="rt-guide">${guide}</td>
    <td class="rt-topic">${topic}</td>
    <td><span class="status-pill ${statusClass(s.status)}">${esc(s.status)||'No status recorded'}</span></td>
  </tr>`;
}

function attachRosterSearch(){
  const input = document.getElementById('rosterSearch');
  if(!input) return;
  input.addEventListener('input', ()=>{
    const q = input.value.toLowerCase();
    document.querySelectorAll('#rosterBody tr').forEach(row=>{
      row.style.display = row.dataset.search.includes(q) ? '' : 'none';
    });
  });
}

/* ---------------- STUDENT DETAIL ---------------- */
function sidePanelHTML(activeId, filter=''){
  const f = filter.toLowerCase();
  return YEARS.map(y=>{
    const list = byYear(y).filter(s=>!f || s.name.toLowerCase().includes(f) || s.id.includes(f));
    if(list.length===0) return '';
    return `
    <div>
      <div class="side-year-label">BATCH ${y} — ${list.length}</div>
      ${list.map(s=>`
        <div class="side-item ${s.id===activeId?'active':''}" onclick="navigate('student/${s.id}')">
          <span>${esc(s.name)}</span><span class="sid">${s.id}</span>
        </div>`).join('')}
    </div>`;
  }).join('');
}

        <div class="v">${s.topic ? esc(s.topic) : 'Not yet decided'}</div>
      </div>

      <span class="status-pill ${statusClass(s.status)}" style="font-size:12.5px;padding:8px 16px;">${esc(s.status) || 'No status recorded'}</span>

      <div class="nav-buttons">
        ${prev ? `<a class="nav-btn" href="#/student/${prev.id}">← ${esc(prev.name)}</a>` : ''}
        <a class="nav-btn" href="#/year/${s.year}">Back to batch ${s.year} roster</a>
        ${next ? `<a class="nav-btn" href="#/student/${next.id}">${esc(next.name)} →</a>` : ''}
      </div>
      <div style="margin-top:20px;">
        <button style="background:none;border:none;color:var(--crimson);font-size:12px;cursor:pointer;text-decoration:underline;padding:0;" onclick="removeStudent('${esc(s.id)}','${s.year}')">Remove this record</button>
      </div>
    </div>
  </div>
  </div>`;
}

function attachSideSearch(activeId){
  const input = document.getElementById('sideSearch');
  if(!input) return;
  input.addEventListener('input', ()=>{
    document.getElementById('sideList').innerHTML = sidePanelHTML(activeId, input.value);
  });
}

/* ---------------- ADD / EDIT SCHOLAR ---------------- */
function nextSno(year){
  const list = byYear(year);
  return list.length ? Math.max(...list.map(s=>s.sno)) + 1 : 1;
}
function genId(year){
  return String(year).replace(/\s+/g,'') + '-' + Date.now().toString(36).toUpperCase();
}

function openStudentForm(mode, arg){
  const isEdit = mode === 'edit';
  const st = isEdit ? findStudent(arg) : null;
  const prefYear = isEdit ? st.year : (arg || (YEARS[YEARS.length-1] || String(new Date().getFullYear())));
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeStudentForm()">
    <div class="modal-box">
      <div class="modal-head">
        <h3>${isEdit ? 'Edit scholar record' : 'Add new scholar'}</h3>
        <button class="modal-close" onclick="closeStudentForm()" type="button">&times;</button>
      </div>
      <form id="studentForm" onsubmit="return submitStudentForm(event, '${isEdit ? esc(st.id) : ''}')">
        <div class="modal-body">
          <div class="form-field full">
            <label>Full name *</label>
            <input name="name" required value="${isEdit ? esc(st.name) : ''}">
          </div>
          <div class="form-field">
            <label>Admission year *</label>
            <select name="yearSelect" onchange="document.getElementById('yearCustomWrap').style.display = this.value === '__new__' ? 'block' : 'none'; document.getElementById('yearCustomInput').required = this.value === '__new__';">
              ${YEARS.map(y => `<option value="${esc(y)}" ${y === prefYear ? 'selected' : ''}>${esc(y)}</option>`).join('')}
              <option value="__new__" ${YEARS.includes(prefYear) ? '' : 'selected'}>+ Add new batch…</option>
            </select>
            <div id="yearCustomWrap" style="margin-top:8px;display:${YEARS.includes(prefYear) ? 'none' : 'block'};">
              <input id="yearCustomInput" name="yearCustom" placeholder="e.g. 2027" value="${YEARS.includes(prefYear) ? '' : esc(prefYear)}" ${YEARS.includes(prefYear) ? '' : 'required'}>
            </div>
          </div>
          <div class="form-field">
            <label>Registration no.</label>
            <input name="regno" value="${isEdit ? esc(st.regno) : ''}">
          </div>
          <div class="form-field">
            <label>Email address</label>
            <input name="email" type="email" value="${isEdit ? esc(st.email) : ''}">
          </div>
          <div class="form-field">
            <label>Contact number</label>
            <input name="contact" value="${isEdit ? esc(st.contact) : ''}">
          </div>
          <div class="form-field full">
            <label>Supervising guide</label>
            <input name="guide" value="${isEdit ? esc(st.guide) : ''}">
          </div>
          <div class="form-field full">
            <label>Thesis topic / title</label>
            <textarea name="topic">${isEdit ? esc(st.topic) : ''}</textarea>
          </div>
          <div class="form-field full">
            <label>Status</label>
            <input name="status" value="${isEdit ? esc(st.status) : 'Ongoing - Coursework'}">
          </div>
          <div class="form-field">
            <label>RAC status</label>
            <input name="rac" value="${isEdit ? esc(st.rac) : ''}">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeStudentForm()">Cancel</button>
          <button type="submit" class="btn-add">${isEdit ? 'Save changes' : 'Add scholar'}</button>
        </div>
      </form>
    </div>
  </div>`;
}

function closeStudentForm(){
  const root = document.getElementById('modalRoot');
  if(root) root.innerHTML = '';
}

async function submitStudentForm(event, editId){
  event.preventDefault();
  const f = event.target;
  const yearSelectVal = f.yearSelect.value;
  const rawYear = yearSelectVal === '__new__' ? f.yearCustom.value : yearSelectVal;
  const data = {
    name: f.name.value.trim(),
    year: rawYear.replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim(),
    regno: f.regno.value.trim(),
    email: f.email.value.trim(),
    contact: f.contact.value.trim(),
    guide: f.guide.value.trim(),
    topic: f.topic.value.trim(),
    status: f.status.value.trim(),
    rac: f.rac.value.trim()
  };
  if(!data.name || !data.year){ return false; }

  const submitBtn = f.querySelector('.btn-add');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }

  try{
    const payload = editId ? { action:'edit', id: editId, data } : { action:'add', data };
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if(result.error) throw new Error(result.error);

    STUDENTS = result.students;
    YEARS = computeYears();
    closeStudentForm();

    if(editId){
      render();
    } else {
      navigate('student/' + result.id);
    }
  } catch(err){
    alert('Could not save to the Google Sheet: ' + (err.message || err));
    if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = editId ? 'Save changes' : 'Add scholar'; }
  }
  return false;
}

async function removeStudent(id, year){
  if(!confirm('Remove this scholar record from the Google Sheet? This cannot be undone.')) return;
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'remove', id })
    });
    const result = await res.json();
    if(result.error) throw new Error(result.error);
    STUDENTS = result.students;
    YEARS = computeYears();
    navigate('year/' + year);
  } catch(err){
    alert('Could not remove the record from the Google Sheet: ' + (err.message || err));
  }
}

function renderNotFound(){
  return `<div class="wrap section"><div class="empty-state">
    <h3>Record not found</h3><p>That page or scholar record doesn't exist in the registry.</p>
    <a class="btn-primary" style="margin-top:18px;display:inline-flex;" href="#/directory">Return to Directory</a>
  </div></div>`;
}
</script>
